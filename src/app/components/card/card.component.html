<div class="card mb-4 rounded-4" [routerLink]="['/user', miUser()?._id]">
    <div class="row g-0">
        <div class="col-3">
            <figure>
                <img [src]="miUser()?.image" class="card-img-top" alt="miUser()?.username">
            </figure>
        </div>
        <div class="col-9 d-flex">
            <div class="card-body card-body d-flex flex-column justify-content-between">
                <div class="d-flex justify-content-between align-top">
                    <h5 class="card-title">{{miUser()?.first_name}} {{miUser()?.last_name}}</h5>
                </div>
                <div class="d-flex flex-row gap-2">
                    <button type="button" class="btn btn-light rounded-3" data-bs-toggle="tooltip" data-bs-placement="top" title="Ver" [routerLink]="['/user', miUser()?._id]">
                        <i class="bi bi-eye"></i>
                    </button>
                    <button type="button" class="btn btn-light rounded-3" data-bs-toggle="tooltip" data-bs-placement="top" title="Editar">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button type="button" class="btn btn-outline-danger rounded-3" data-bs-toggle="tooltip" data-bs-placement="top"
                        title="Editar">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
</div>
