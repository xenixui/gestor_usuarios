<section class="section-white">
    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3">
        @for(user of arrUsers(); track user._id) {
            <article class="col">
                <app-card [user] = "user"></app-card>
            </article>
        }
    </div>
    <app-paginator (pageChanged)="loadPage($event)"></app-paginator>
</section>
